name: flutter_ai_devtools
description: >-
  Surface a running Flutter app's live logs, errors, issues, routes, widget
  tree, and frame metrics to AI clients (Claude, etc.) over MCP. Terminal-free.
version: 0.1.0
repository: https://github.com/sree77zz/flutter_ai_devtools
issue_tracker: https://github.com/sree77zz/flutter_ai_devtools/issues

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  meta: ^1.11.0
  uuid: ^4.4.0
  vm_service: ^14.2.4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4

executables:
  devtools_mcp: devtools_mcp
  setup: setup
  serve: serve

flutter:
  uses-material-design: false