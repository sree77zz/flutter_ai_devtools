name: flutter_ai_devtools
description: >
  AI-native Flutter runtime intelligence platform. Exposes Flutter app internals
  (widget tree, routes, errors, frames, renders) to AI clients (Claude, Cursor,
  Gemini, Codex, VSCode) via MCP/JSON-RPC 2.0. Framework-agnostic, event-driven,
  modular, pub.dev production quality.
version: 0.1.0
repository: https://github.com/sree77zz/flutter_ai_devtools
issue_tracker: https://github.com/sree77zz/flutter_ai_devtools/issues

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  meta: ^1.11.0
  uuid: ^4.4.0
  vm_service: ^14.2.4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4

executables:
  devtools_mcp: devtools_mcp
  setup: setup
  serve: serve

flutter:
  uses-material-design: false